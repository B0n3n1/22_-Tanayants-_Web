<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная №6 - Управление данными</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #333;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .content-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            min-height: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .add-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .card-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .edit-btn, .delete-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            background: #28a745;
            color: white;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        .loader.hidden {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 16px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Управление данными</h1>
            <div class="nav-buttons">
                <button class="nav-btn active" data-type="posts">📝 Посты</button>
                <button class="nav-btn" data-type="comments">💬 Комментарии</button>
                <button class="nav-btn" data-type="users">👥 Пользователи</button>
            </div>
        </header>

        <div class="content-area">
            <div id="loader" class="loader hidden">⏳ Загрузка...</div>
            <div id="data-container"></div>
        </div>

        <footer>
            <p>Лабораторная работа №6</p>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Создать запись</h3>
            <form id="modal-form">
                <div id="form-fields"></div>
                <div class="modal-buttons">
                    <button type="submit" class="save-btn">💾 Сохранить</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">❌ Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://jsonplaceholder.typicode.com';
        let currentType = 'posts';
        let currentData = [];
        let editingItem = null;

        const russianPosts = [
            { id: 1, title: 'Веб-программирование', body: 'Сегодня начали изучать HTML и CSS. Очень интересно, но много новой информации.', userId: 1 },
            { id: 2, title: 'Мой первый сайт', body: 'Сверстал свою первую страницу! Пока просто, но я горжусь собой.', userId: 1 },
            { id: 3, title: 'JavaScript - это сложно', body: 'Начал изучать JavaScript. Функции и переменные пока непонятны, но буду разбираться.', userId: 2 },
            { id: 4, title: 'Новое начало', body: 'Сделал карточную игру на классах. Получилось круто!', userId: 2 },
            { id: 5, title: 'API', body: 'Узнал, как работать с API. Теперь могу многое)).', userId: 3 }
        ];

        const russianComments = [
            { id: 1, name: 'Алексей', email: 'alex@mail.ru', body: 'Отличная статья! Очень помогло разобраться.', postId: 1 },
            { id: 2, name: 'Мария', email: 'maria@mail.ru', body: 'Спасибо, жду продолжения!', postId: 1 },
            { id: 3, name: 'Дмитрий', email: 'dima@mail.ru', body: 'JavaScript действительно сложный, но со временем привыкаешь.', postId: 3 },
            { id: 4, name: 'Елена', email: 'elena@mail.ru', body: 'Поздравляю с первой страницей!', postId: 2 },
            { id: 5, name: 'Сергей', email: 'sergey@mail.ru', body: 'API - это мощный инструмент, дальше будет ещё интереснее.', postId: 5 }
        ];

        const russianUsers = [
            { id: 1, name: 'Иван Петров', username: 'ivan_p', email: 'ivan@mail.ru', phone: '+7 (999) 123-45-67', website: 'ivan.ru' },
            { id: 2, name: 'Мария Сидорова', username: 'masha_s', email: 'masha@mail.ru', phone: '+7 (999) 234-56-78', website: 'masha.ru' },
            { id: 3, name: 'Дмитрий Смирнов', username: 'dima_s', email: 'dima@mail.ru', phone: '+7 (999) 345-67-89', website: 'dima.ru' }
        ];

        function loadFromStorage() {
            const posts = localStorage.getItem('my_posts');
            const comments = localStorage.getItem('my_comments');
            const users = localStorage.getItem('my_users');

            if (!posts) {
                localStorage.setItem('my_posts', JSON.stringify(russianPosts));
            }
            if (!comments) {
                localStorage.setItem('my_comments', JSON.stringify(russianComments));
            }
            if (!users) {
                localStorage.setItem('my_users', JSON.stringify(russianUsers));
            }
        }

        function saveToStorage(type, data) {
            localStorage.setItem(`my_${type}`, JSON.stringify(data));
        }

        function getDataFromStorage(type) {
            const data = localStorage.getItem(`my_${type}`);
            return data ? JSON.parse(data) : [];
        }

        async function fetchRealData(type) {
            try {
                const response = await fetch(`${API_URL}/${type}`);
                const data = await response.json();
                return data.slice(0, 10);
            } catch (error) {
                console.error('Ошибка загрузки из API:', error);
                return [];
            }
        }

        function render() {
            const container = document.getElementById('data-container');
            const data = getDataFromStorage(currentType);
            
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Нет данных. Нажмите "Создать" чтобы добавить.</div>';
                return;
            }

            let html = '<button class="add-btn" onclick="openCreateModal()">➕ Создать</button>';
            html += '<div class="cards-grid">';
            
            data.forEach(item => {
                if (currentType === 'posts') {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(item.title)}</h3>
                            <p>${escapeHtml(item.body)}</p>
                            <div class="card-meta">👤 Автор: ${item.userId}</div>
                            <div class="card-actions">
                                <button class="edit-btn" onclick="openEditModal(${item.id})">✏️ Редактировать</button>
                                <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️ Удалить</button>
                            </div>
                        </div>
                    `;
                } else if (currentType === 'comments') {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(item.name)}</h3>
                            <p>${escapeHtml(item.body)}</p>
                            <div class="card-meta">📧 ${escapeHtml(item.email)} | 📌 К посту #${item.postId}</div>
                            <div class="card-actions">
                                <button class="edit-btn" onclick="openEditModal(${item.id})">✏️ Редактировать</button>
                                <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️ Удалить</button>
                            </div>
                        </div>
                    `;
                } else if (currentType === 'users') {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(item.name)}</h3>
                            <p><strong>👤 Логин:</strong> ${escapeHtml(item.username)}<br>
                            <strong>📧 Email:</strong> ${escapeHtml(item.email)}<br>
                            <strong>📞 Телефон:</strong> ${escapeHtml(item.phone || '—')}<br>
                            <strong>🌐 Сайт:</strong> ${escapeHtml(item.website || '—')}</p>
                            <div class="card-actions">
                                <button class="edit-btn" onclick="openEditModal(${item.id})">✏️ Редактировать</button>
                                <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️ Удалить</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function createItem(data) {
            const items = getDataFromStorage(currentType);
            const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
            const newItem = { id: newId, ...data };
            items.push(newItem);
            saveToStorage(currentType, items);
            render();
        }

        function updateItem(id, data) {
            const items = getDataFromStorage(currentType);
            const index = items.findIndex(i => i.id === id);
            if (index !== -1) {
                items[index] = { ...items[index], ...data, id: items[index].id };
                saveToStorage(currentType, items);
                render();
            }
        }

        function deleteItem(id) {
            if (confirm('Удалить эту запись?')) {
                const items = getDataFromStorage(currentType);
                const filtered = items.filter(i => i.id !== id);
                saveToStorage(currentType, filtered);
                render();
            }
        }

        function openCreateModal() {
            editingItem = null;
            document.getElementById('modal-title').textContent = `➕ Создать ${getTypeName()}`;
            document.getElementById('form-fields').innerHTML = getFormFields();
            document.getElementById('modal').classList.add('active');
        }

        function openEditModal(id) {
            const items = getDataFromStorage(currentType);
            editingItem = items.find(i => i.id === id);
            if (editingItem) {
                document.getElementById('modal-title').textContent = `✏️ Редактировать ${getTypeName()}`;
                document.getElementById('form-fields').innerHTML = getFormFields(editingItem);
                document.getElementById('modal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingItem = null;
        }

        function getFormFields(existing = null) {
            if (currentType === 'posts') {
                return `
                    <div class="form-group">
                        <label>Заголовок *</label>
                        <input type="text" id="post-title" value="${escapeHtml(existing?.title || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Содержание *</label>
                        <textarea id="post-body" rows="4" required>${escapeHtml(existing?.body || '')}</textarea>
                    </div>
                    <div class="form-group">
                        <label>ID автора (1-10)</label>
                        <input type="number" id="post-userId" value="${existing?.userId || 1}" min="1" max="10">
                    </div>
                `;
            } else if (currentType === 'comments') {
                return `
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="comment-name" value="${escapeHtml(existing?.name || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="comment-email" value="${escapeHtml(existing?.email || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Текст комментария *</label>
                        <textarea id="comment-body" rows="4" required>${escapeHtml(existing?.body || '')}</textarea>
                    </div>
                    <div class="form-group">
                        <label>ID поста</label>
                        <input type="number" id="comment-postId" value="${existing?.postId || 1}" min="1">
                    </div>
                `;
            } else {
                return `
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="user-name" value="${escapeHtml(existing?.name || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Логин *</label>
                        <input type="text" id="user-username" value="${escapeHtml(existing?.username || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="user-email" value="${escapeHtml(existing?.email || '')}" required>
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="text" id="user-phone" value="${escapeHtml(existing?.phone || '')}">
                    </div>
                    <div class="form-group">
                        <label>Сайт</label>
                        <input type="text" id="user-website" value="${escapeHtml(existing?.website || '')}">
                    </div>
                `;
            }
        }

        function saveModal() {
            let data = {};
            
            if (currentType === 'posts') {
                data = {
                    title: document.getElementById('post-title').value,
                    body: document.getElementById('post-body').value,
                    userId: parseInt(document.getElementById('post-userId').value) || 1
                };
            } else if (currentType === 'comments') {
                data = {
                    name: document.getElementById('comment-name').value,
                    email: document.getElementById('comment-email').value,
                    body: document.getElementById('comment-body').value,
                    postId: parseInt(document.getElementById('comment-postId').value) || 1
                };
            } else {
                data = {
                    name: document.getElementById('user-name').value,
                    username: document.getElementById('user-username').value,
                    email: document.getElementById('user-email').value,
                    phone: document.getElementById('user-phone').value,
                    website: document.getElementById('user-website').value
                };
            }

            if (editingItem) {
                updateItem(editingItem.id, data);
            } else {
                createItem(data);
            }
            
            closeModal();
        }

        function getTypeName() {
            const names = { posts: 'пост', comments: 'комментарий', users: 'пользователя' };
            return names[currentType];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function init() {
            loadFromStorage();
            render();
            
            const posts = getDataFromStorage('posts');
            if (posts.length === 0) {
                const loader = document.getElementById('loader');
                loader.classList.remove('hidden');
                
                const apiPosts = await fetchRealData('posts');
                if (apiPosts.length > 0) {
                    saveToStorage('posts', apiPosts);
                }
                
                loader.classList.add('hidden');
                render();
            }
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                render();
            });
        });

        document.getElementById('modal-form').addEventListener('submit', (e) => {
            e.preventDefault();
            saveModal();
        });
        init();
    </script>
</body>
</html>
