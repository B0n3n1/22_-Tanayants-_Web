<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная №6 - Работа с API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        header {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-bottom: 3px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffd700;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }
        main {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .loader {
            text-align: center;
            padding: 60px;
            font-size: 1.5rem;
            color: #ffd700;
        }
        .error {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .error.hidden, .loader.hidden { display: none; }
        .create-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px 25px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .card {
            background: #2a2a3a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #3a3a4a;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card-header {
            padding: 15px 20px;
            border-left: 4px solid #ffd700;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h3 { font-size: 1.2rem; color: #fff; margin: 0; }
        .badge {
            background: #ffd700;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .card-body { padding: 20px; }
        .card-body p { margin-bottom: 10px; line-height: 1.5; }
        .card-footer {
            padding: 12px 20px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-actions { display: flex; gap: 10px; }
        .edit-btn, .delete-btn {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
        }
        .edit-btn { color: #ffc107; }
        .delete-btn { color: #dc3545; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #2a2a3a;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #3a3a4a;
            border-radius: 10px;
            background: #1e1e2e;
            color: #fff;
        }
        .submit-btn, .cancel-btn {
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn { background: #28a745; color: white; width: 100%; }
        .cancel-btn { background: #dc3545; color: white; width: 100%; margin-top: 10px; }
        footer { text-align: center; padding: 25px; color: #888; border-top: 1px solid #2a2a3a; margin-top: 50px; }
        @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>📡 Работа с API</h1>
        <nav>
            <button class="nav-btn active" data-api="posts">📝 Посты</button>
            <button class="nav-btn" data-api="comments">💬 Комментарии</button>
            <button class="nav-btn" data-api="users">👥 Пользователи</button>
        </nav>
    </header>

    <main>
        <div id="content-area">
            <div id="loader" class="loader">⏳ Загрузка...</div>
            <div id="data-container"></div>
            <div id="error-message" class="error hidden"></div>
        </div>

        <div id="form-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="form-title">Создать</h3>
                <form id="data-form">
                    <div id="form-fields"></div>
                    <button type="submit" class="submit-btn">💾 Сохранить</button>
                    <button type="button" class="cancel-btn">❌ Отмена</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>Лабораторная работа №6 | Использование API (GET, POST, PUT, DELETE)</p>
    </footer>

    <script>
        const BASE_URL = 'https://jsonplaceholder.typicode.com';
        const API_ENDPOINTS = { posts: '/posts', comments: '/comments', users: '/users' };
        const DEFAULT_LIMIT = 10;
        let currentApi = 'posts';
        let currentData = [];
        let editingItem = null;
        const loader = document.getElementById('loader');
        const errorEl = document.getElementById('error-message');
        const dataContainer = document.getElementById('data-container');
        const modal = document.getElementById('form-modal');
        const formTitle = document.getElementById('form-title');
        const formFields = document.getElementById('form-fields');
        const closeModalBtn = document.querySelector('.close');
        const cancelBtn = document.querySelector('.cancel-btn');
        function showLoader() { loader.classList.remove('hidden'); }
        function hideLoader() { loader.classList.add('hidden'); }
        function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); setTimeout(() => errorEl.classList.add('hidden'), 5000); }
        function hideError() { errorEl.classList.add('hidden'); }
        function renderData(html) { dataContainer.innerHTML = html; }
        function clearData() { dataContainer.innerHTML = ''; }
        function showSuccess(msg) { alert(msg); }

        function openModal(title, formHtml, onSubmit) {
            formTitle.textContent = title;
            formFields.innerHTML = formHtml;
            modal.classList.remove('hidden');
            const form = document.getElementById('data-form');
            form.onsubmit = async (e) => {
                e.preventDefault();
                await onSubmit();
                closeModal();
            };
        }

        function closeModal() {
            modal.classList.add('hidden');
            formFields.innerHTML = '';
        }
        async function apiRequest(endpoint, method = 'GET', data = null, id = null) {
            let url = `${BASE_URL}${endpoint}`;
            if (id) url += `/${id}`;
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data && (method === 'POST' || method === 'PUT')) options.body = JSON.stringify(data);
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            if (method === 'DELETE') return { success: true };
            return await response.json();
        }

        async function fetchPosts() { const data = await apiRequest(API_ENDPOINTS.posts, 'GET'); return data.slice(0, DEFAULT_LIMIT); }
        async function createPost(data) { return await apiRequest(API_ENDPOINTS.posts, 'POST', data); }
        async function updatePost(id, data) { return await apiRequest(API_ENDPOINTS.posts, 'PUT', data, id); }
        async function deletePost(id) { return await apiRequest(API_ENDPOINTS.posts, 'DELETE', null, id); }
        async function fetchComments() { const data = await apiRequest(API_ENDPOINTS.comments, 'GET'); return data.slice(0, DEFAULT_LIMIT); }
        async function createComment(data) { return await apiRequest(API_ENDPOINTS.comments, 'POST', data); }
        async function updateComment(id, data) { return await apiRequest(API_ENDPOINTS.comments, 'PUT', data, id); }
        async function deleteComment(id) { return await apiRequest(API_ENDPOINTS.comments, 'DELETE', null, id); }
        async function fetchUsers() { const data = await apiRequest(API_ENDPOINTS.users, 'GET'); return data.slice(0, DEFAULT_LIMIT); }
        async function createUser(data) { return await apiRequest(API_ENDPOINTS.users, 'POST', data); }
        async function updateUser(id, data) { return await apiRequest(API_ENDPOINTS.users, 'PUT', data, id); }
        async function deleteUser(id) { return await apiRequest(API_ENDPOINTS.users, 'DELETE', null, id); }
        function renderList(items, type) {
            if (!items || items.length === 0) return '<div class="empty-state">Нет данных</div>';
            return `<div class="cards-grid">${items.map(item => renderCard(item, type)).join('')}</div>`;
        }

        function renderCard(item, type) {
            if (type === 'posts') {
                return `
                    <div class="card" data-id="${item.id}">
                        <div class="card-header"><h3>${escapeHtml(item.title)}</h3><span class="badge">Пост #${item.id}</span></div>
                        <div class="card-body"><p>${escapeHtml(item.body)}</p></div>
                        <div class="card-footer"><span>👤 User ID: ${item.userId}</span>
                        <div class="card-actions"><button class="edit-btn" data-id="${item.id}">✏️</button><button class="delete-btn" data-id="${item.id}">🗑️</button></div></div>
                    </div>
                `;
            }
            if (type === 'comments') {
                return `
                    <div class="card" data-id="${item.id}">
                        <div class="card-header"><h3>${escapeHtml(item.name)}</h3><span class="badge">Коммент #${item.id}</span></div>
                        <div class="card-body"><div>📧 ${escapeHtml(item.email)}</div><p>${escapeHtml(item.body)}</p></div>
                        <div class="card-footer"><span>✍️ ${escapeHtml(item.name)}</span>
                        <div class="card-actions"><button class="edit-btn" data-id="${item.id}">✏️</button><button class="delete-btn" data-id="${item.id}">🗑️</button></div></div>
                    </div>
                `;
            }
            if (type === 'users') {
                return `
                    <div class="card" data-id="${item.id}">
                        <div class="card-header"><h3>${escapeHtml(item.name)}</h3><span class="badge">User #${item.id}</span></div>
                        <div class="card-body"><div>👤 ${escapeHtml(item.username)}</div><div>📧 ${escapeHtml(item.email)}</div></div>
                        <div class="card-footer"><span>💼 ${escapeHtml(item.company?.name || '—')}</span>
                        <div class="card-actions"><button class="edit-btn" data-id="${item.id}">✏️</button><button class="delete-btn" data-id="${item.id}">🗑️</button></div></div>
                    </div>
                `;
            }
            return '';
        }

        function getFormHtml(type, existing = null) {
            if (type === 'posts') {
                return `<div class="form-group"><label>Заголовок</label><input type="text" name="title" value="${escapeHtml(existing?.title || '')}" required></div>
                        <div class="form-group"><label>Содержание</label><textarea name="body" rows="4" required>${escapeHtml(existing?.body || '')}</textarea></div>`;
            }
            if (type === 'comments') {
                return `<div class="form-group"><label>Имя</label><input type="text" name="name" value="${escapeHtml(existing?.name || '')}" required></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" value="${escapeHtml(existing?.email || '')}" required></div>
                        <div class="form-group"><label>Текст</label><textarea name="body" rows="4" required>${escapeHtml(existing?.body || '')}</textarea></div>`;
            }
            if (type === 'users') {
                return `<div class="form-group"><label>Имя</label><input type="text" name="name" value="${escapeHtml(existing?.name || '')}" required></div>
                        <div class="form-group"><label>Логин</label><input type="text" name="username" value="${escapeHtml(existing?.username || '')}" required></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" value="${escapeHtml(existing?.email || '')}" required></div>`;
            }
            return '';
        }

        function collectFormData(fields) {
            const data = {};
            fields.forEach(f => { const input = document.querySelector(`[name="${f}"]`); if (input) data[f] = input.value; });
            return data;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        async function loadData(api) {
            showLoader();
            clearData();
            try {
                let data = [];
                if (api === 'posts') data = await fetchPosts();
                else if (api === 'comments') data = await fetchComments();
                else if (api === 'users') data = await fetchUsers();
                currentData = data;
                renderData(renderList(data, api));
                attachCardButtons(api);
                addCreateButton(api);
            } catch (err) {
                showError(err.message);
                renderData(`<div class="empty-state">Ошибка: ${err.message}</div>`);
            } finally {
                hideLoader();
            }
        }

        function attachCardButtons(api) {
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = parseInt(btn.dataset.id);
                    const item = currentData.find(i => i.id === id);
                    if (item) {
                        editingItem = item;
                        const formHtml = getFormHtml(api, item);
                        openModal(`✏️ Редактировать ${api === 'posts' ? 'пост' : api === 'comments' ? 'коммент' : 'пользователя'} #${id}`, formHtml, async () => {
                            const fields = api === 'posts' ? ['title', 'body'] : api === 'comments' ? ['name', 'email', 'body'] : ['name', 'username', 'email'];
                            const formData = collectFormData(fields);
                            if (api === 'posts') await updatePost(id, formData);
                            else if (api === 'comments') await updateComment(id, formData);
                            else await updateUser(id, formData);
                            showSuccess('Обновлено!');
                            await loadData(api);
                        });
                    }
                };
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (!confirm('Удалить?')) return;
                    const id = parseInt(btn.dataset.id);
                    if (api === 'posts') await deletePost(id);
                    else if (api === 'comments') await deleteComment(id);
                    else await deleteUser(id);
                    showSuccess('Удалено!');
                    await loadData(api);
                };
            });
        }

        function addCreateButton(api) {
            let btn = document.querySelector('.create-btn');
            if (!btn) {
                btn = document.createElement('button');
                btn.className = 'create-btn';
                btn.textContent = '+ Создать';
                dataContainer.parentNode.insertBefore(btn, dataContainer);
            }
            btn.onclick = () => {
                const formHtml = getFormHtml(api);
                openModal(`➕ Создать ${api === 'posts' ? 'пост' : api === 'comments' ? 'коммент' : 'пользователя'}`, formHtml, async () => {
                    const fields = api === 'posts' ? ['title', 'body'] : api === 'comments' ? ['name', 'email', 'body'] : ['name', 'username', 'email'];
                    const formData = collectFormData(fields);
                    if (api === 'posts') await createPost({ ...formData, userId: 1 });
                    else if (api === 'comments') await createComment({ ...formData, postId: 1 });
                    else await createUser(formData);
                    showSuccess('Создано!');
                    await loadData(api);
                });
            };
        }
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentApi = btn.dataset.api;
                loadData(currentApi);
            };
        });
        closeModalBtn.onclick = closeModal;
        cancelBtn.onclick = closeModal;
        window.onclick = (e) => { if (e.target === modal) closeModal(); };
        loadData('posts');
    </script>
</body>
</html>
