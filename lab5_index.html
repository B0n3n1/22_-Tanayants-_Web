<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная №6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; margin-bottom: 15px; }
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #e0e0e0;
            color: #333;
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .content-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            min-height: 500px;
        }
        .add-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card h3 { color: #333; margin-bottom: 10px; font-size: 18px; }
        .card p { color: #666; line-height: 1.5; margin-bottom: 15px; }
        .card-meta { font-size: 12px; color: #999; margin-bottom: 15px; }
        .card-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .edit-btn, .delete-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .edit-btn { background: #ffc107; color: #333; }
        .delete-btn { background: #dc3545; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .save-btn { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .cancel-btn { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .loader { text-align: center; padding: 50px; font-size: 18px; color: #666; }
        .loader.hidden { display: none; }
        .empty-state { text-align: center; padding: 50px; color: #999; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .error.show { display: block; }
        footer { text-align: center; margin-top: 30px; color: white; font-size: 14px; }
        .info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 API</h1>
            <div class="nav-buttons">
                <button class="nav-btn active" data-type="posts">📝 Посты</button>
                <button class="nav-btn" data-type="users">👥 Случайные пользователи</button>
                <button class="nav-btn" data-type="jokes">😂 Случайные шутки</button>
            </div>
        </header>

        <div class="content-area">
            <div id="info" class="info">✅ Посты сохраняются на сервере MockAPI! Добавленные, отредактированные и удалённые посты будут видны после перезагрузки.</div>
            <div id="error" class="error"></div>
            <div id="loader" class="loader hidden">⏳ Загрузка...</div>
            <div id="data-container"></div>
        </div>

        <footer>
            <p>Лабораторная работа №6</p>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Создать пост</h3>
            <form id="modal-form">
                <div id="form-fields"></div>
                <div class="modal-buttons">
                    <button type="submit" class="save-btn">💾 Сохранить</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">❌ Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const MOCKAPI_URL = 'https://69caaa6cba5984c44bf393d3.mockapi.io/posts';
        
        const API_URLS = {
            posts: MOCKAPI_URL,
            users: 'https://randomuser.me/api/?results=10',
            jokes: 'https://official-joke-api.appspot.com/random_ten'
        };

        let currentType = 'posts';
        let currentData = [];
        let editingItem = null;

        function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
        async function apiRequest(url, method = 'GET', data = null) {
            const options = { 
                method, 
                headers: { 'Content-Type': 'application/json' } 
            };
            if (data && (method === 'POST' || method === 'PUT')) {
                options.body = JSON.stringify(data);
            }
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            if (method === 'DELETE') return { success: true };
            return await response.json();
        }

        async function loadPosts() {
            try {
                const data = await apiRequest(API_URLS.posts, 'GET');
                return data;
            } catch (error) {
                console.error('Ошибка загрузки постов:', error);
                return [];
            }
        }

        async function createPost(data) {
            return await apiRequest(API_URLS.posts, 'POST', data);
        }

        async function updatePost(id, data) {
            return await apiRequest(`${API_URLS.posts}/${id}`, 'PUT', data);
        }

        async function deletePost(id) {
            return await apiRequest(`${API_URLS.posts}/${id}`, 'DELETE');
        }

        async function loadUsers() {
            const response = await fetch(API_URLS.users);
            const data = await response.json();
            return data.results;
        }

        async function loadJokes() {
            const response = await fetch(API_URLS.jokes);
            const data = await response.json();
            return data;
        }

        async function loadData() {
            showLoader();
            document.getElementById('error').classList.remove('show');
            
            try {
                if (currentType === 'posts') {
                    currentData = await loadPosts();
                } else if (currentType === 'users') {
                    currentData = await loadUsers();
                } else if (currentType === 'jokes') {
                    currentData = await loadJokes();
                }
                render();
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка загрузки: ' + error.message);
                document.getElementById('data-container').innerHTML = '<div class="empty-state">❌ Не удалось загрузить данные. Проверьте настройки API.</div>';
            } finally {
                hideLoader();
            }
        }

        function render() {
            const container = document.getElementById('data-container');
            
            if (!currentData || currentData.length === 0) {
                if (currentType === 'posts') {
                    container.innerHTML = '<button class="add-btn" onclick="openCreateModal()">➕ Создать первый пост</button><div class="empty-state">📭 Нет постов. Создайте первый!</div>';
                } else {
                    container.innerHTML = '<div class="empty-state">📭 Нет данных</div>';
                }
                return;
            }

            let html = '';
            
            if (currentType === 'posts') {
                html += '<button class="add-btn" onclick="openCreateModal()">➕ Создать пост</button>';
            }
            
            html += '<div class="cards-grid">';
            
            if (currentType === 'posts') {
                currentData.forEach(post => {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(post.title)}</h3>
                            <p>${escapeHtml(post.body)}</p>
                            <div class="card-meta">👤 Автор ID: ${post.userId || 1} | 🆔 ID: ${post.id}</div>
                            <div class="card-actions">
                                <button class="edit-btn" onclick="openEditModal(${post.id})">✏️ Редактировать</button>
                                <button class="delete-btn" onclick="handleDelete(${post.id})">🗑️ Удалить</button>
                            </div>
                        </div>
                    `;
                });
            } 
            else if (currentType === 'users') {
                currentData.forEach(user => {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(user.name?.first)} ${escapeHtml(user.name?.last)}</h3>
                            <p><strong>👤 Gender:</strong> ${user.gender}<br>
                            <strong>📧 Email:</strong> ${user.email}<br>
                            <strong>📞 Phone:</strong> ${user.phone}<br>
                            <strong>🌍 Country:</strong> ${user.location?.country}</p>
                            <div class="card-meta">🔗 ${user.login?.username}</div>
                        </div>
                    `;
                });
            } 
            else if (currentType === 'jokes') {
                currentData.forEach(joke => {
                    html += `
                        <div class="card">
                            <h3>😂 ${escapeHtml(joke.setup)}</h3>
                            <p><strong>${escapeHtml(joke.punchline)}</strong></p>
                            <div class="card-meta">📌 Type: ${joke.type || 'general'}</div>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        async function handleDelete(id) {
            if (!confirm('Удалить этот пост? Данные удалятся с сервера!')) return;
            showLoader();
            try {
                await deletePost(id);
                await loadData();
            } catch (error) {
                showError('Ошибка удаления: ' + error.message);
            } finally {
                hideLoader();
            }
        }

        function openCreateModal() {
            editingItem = null;
            document.getElementById('modal-title').textContent = '➕ Создать пост';
            document.getElementById('form-fields').innerHTML = `
                <div class="form-group"><label>Заголовок *</label><input type="text" id="post-title" required></div>
                <div class="form-group"><label>Содержание *</label><textarea id="post-body" rows="4" required></textarea></div>
                <div class="form-group"><label>ID автора</label><input type="number" id="post-userId" value="1"></div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function openEditModal(id) {
            editingItem = currentData.find(p => p.id === id);
            if (editingItem) {
                document.getElementById('modal-title').textContent = '✏️ Редактировать пост';
                document.getElementById('form-fields').innerHTML = `
                    <div class="form-group"><label>Заголовок *</label><input type="text" id="post-title" value="${escapeHtml(editingItem.title)}" required></div>
                    <div class="form-group"><label>Содержание *</label><textarea id="post-body" rows="4" required>${escapeHtml(editingItem.body)}</textarea></div>
                    <div class="form-group"><label>ID автора</label><input type="number" id="post-userId" value="${editingItem.userId || 1}"></div>
                `;
                document.getElementById('modal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingItem = null;
        }

        async function savePost() {
            const title = document.getElementById('post-title').value;
            const body = document.getElementById('post-body').value;
            
            if (!title || !body) {
                showError('Заполните заголовок и содержание');
                return;
            }
            
            const data = {
                title: title,
                body: body,
                userId: parseInt(document.getElementById('post-userId').value) || 1
            };
            
            showLoader();
            try {
                if (editingItem) {
                    await updatePost(editingItem.id, data);
                } else {
                    await createPost(data);
                }
                await loadData();
                closeModal();
            } catch (error) {
                showError('Ошибка сохранения: ' + error.message);
            } finally {
                hideLoader();
            }
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                loadData();
            });
        });

        document.getElementById('modal-form').addEventListener('submit', (e) => {
            e.preventDefault();
            savePost();
        });
        loadData();
    </script>
</body>
</html>
